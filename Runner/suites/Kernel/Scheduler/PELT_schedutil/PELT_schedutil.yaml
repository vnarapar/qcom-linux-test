metadata:
  name: pelt-schedutil
  format: "Lava-Test Test Definition 1.0"
  description: "Validates schedutil cpufreq governor integration with PELT utilization signals"
  maintainer:
    - vnarapar@qti.qualcomm.com
  os:
    - linux
  scope:
    - functional
  devices:
    - rb3gen2
    - qcs6490
    - qcs8300
    - qcs9100
    - sa8775p

run:
  steps:
    - REPO_PATH=$PWD
    - cd "$REPO_PATH/Runner/suites/Kernel/Scheduler/PELT_schedutil"  || true
    - ./run.sh
    - $REPO_PATH/Runner/utils/send-to-lava.sh PELT_schedutil.res
