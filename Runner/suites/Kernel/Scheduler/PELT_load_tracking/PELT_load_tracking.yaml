metadata:
  name: pelt-load-tracking
  format: "Lava-Test Test Definition 1.0"
  description: "Functional validation that PELT tracks CPU utilization under real scheduler load"
  maintainer:
    - vnarapar@qti.qualcomm.com
  os:
    - linux
  scope:
    - functional
  devices:
    - rb3gen2
    - qcs6490
    - qcs8300
    - qcs9100
    - sa8775p

run:
  steps:
    - REPO_PATH=$PWD
    - cd "$REPO_PATH/Runner/suites/Kernel/Scheduler/PELT_load_tracking"  || true
    - ./run.sh
    - $REPO_PATH/Runner/utils/send-to-lava.sh PELT_load_tracking.res
