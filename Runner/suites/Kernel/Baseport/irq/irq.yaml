metadata:
    format: Lava-Test Test Definition 1.0
    name: irq
    description: "Validate per-CPU arch_timer interrupt delivery using active pinned CPU workload"
    maintainer:
        - vnarapar@qti.qualcomm.com
    os:
        - openembedded
    scope:
        - functional
    devices:
        - rb3gen2

params:
    IRQ_TIMER_PATTERN: "arch_timer"
    IRQ_WORKLOAD_SECONDS: "5"
    IRQ_RETRIES: "2"
    IRQ_SKIP_ISOLATED: "1"

run:
    steps:
        - REPO_PATH=$PWD
        - cd Runner/suites/Kernel/Baseport/irq
        - IRQ_TIMER_PATTERN="${IRQ_TIMER_PATTERN}" IRQ_WORKLOAD_SECONDS="${IRQ_WORKLOAD_SECONDS}" IRQ_RETRIES="${IRQ_RETRIES}" IRQ_SKIP_ISOLATED="${IRQ_SKIP_ISOLATED}" ./run.sh || true
        - $REPO_PATH/Runner/utils/send-to-lava.sh irq.res
