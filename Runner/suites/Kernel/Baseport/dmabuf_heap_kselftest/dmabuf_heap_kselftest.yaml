metadata:
    format: Lava-Test Test Definition 1.0
    name: dmabuf_heap_kselftest
    description: "DMA-BUF heap kselftest binary validation"
    maintainer:
        - vnarapar@qti.qualcomm.com
    os:
        - openembedded
    scope:
        - functional
    devices:
        - rb3gen2
        - qcs6490
        - qcs8300
        - qcs9100
        - sa8775p
params:
  KSELFTEST_DMA_BIN: "/kselftest/dmabuf-heaps/dmabuf-heap"

run:
    steps:
        - REPO_PATH="$PWD"
        - cd "$REPO_PATH/Runner/suites/Kernel/Baseport/dmabuf_heap_kselftest"
        - ./run.sh --binary-path "${KSELFTEST_DMA_BIN}"
        - $REPO_PATH/Runner/utils/send-to-lava.sh dmabuf_heap_kselftest.res
