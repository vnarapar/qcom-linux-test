metadata:
  name: PI_Stress
  format: "Lava-Test Test Definition 1.0"
  description: "Run rt-tests pi_stress priority inversion stress test and collect inversion KPIs from JSON without requiring python3."
  os:
    - linux
  scope:
    - functional
    - preempt-rt

params:
  DURATION: "30s"
  MLOCKALL: "false"
  RR: "false"
  BACKGROUND_CMD: ""
  ITERATIONS: "1"
  USER_BASELINE: ""

  BINARY: ""
  OUT_DIR: "./logs_PI_Stress"

  VERBOSE: "0"
  PROGRESS_EVERY: "1"
  HEARTBEAT_SEC: "10"

run:
  steps:
    - REPO_PATH=$PWD
    - cd Runner/suites/Kernel/RT-tests/PI_Stress
    - ./run.sh --duration "${DURATION}" --mlockall "${MLOCKALL}" --rr "${RR}" --iterations "${ITERATIONS}" --background-cmd "${BACKGROUND_CMD}" --user-baseline "${USER_BASELINE}" --binary "${BINARY}" --out "${OUT_DIR}" --progress-every "${PROGRESS_EVERY}" --heartbeat-sec "${HEARTBEAT_SEC}" $( [ "${VERBOSE}" = "1" ] && echo "--verbose" ) || true
    - $REPO_PATH/Runner/utils/send-to-lava.sh PI_Stress.res
