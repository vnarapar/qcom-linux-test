metadata:
  name: PMQTest
  format: "Lava-Test Test Definition 1.0"
  description: "Run rt-tests pmqtest (POSIX message queue latency) in JSON mode and parse results without requiring python3."
  os:
    - linux
  scope:
    - performance
    - preempt-rt

params:
  DURATION: "30s"
  BACKGROUND_CMD: ""
  ITERATIONS: "1"

  PRIO: "98"
  MODE_S: "true"
  QUIET: "true"

  BINARY: ""
  OUT_DIR: "./logs_PMQTest"
  VERBOSE: "0"
  PROGRESS_EVERY: "1"
  HEARTBEAT_SEC: "10"

run:
  steps:
    - REPO_PATH=$PWD
    - cd Runner/suites/Kernel/RT-tests/PMQTest
    - PRIO="${PRIO}" MODE_S="${MODE_S}" QUIET="${QUIET}" ./run.sh --duration "${DURATION}" --iterations "${ITERATIONS}" --background-cmd "${BACKGROUND_CMD}" --binary "${BINARY}" --out "${OUT_DIR}" --progress-every "${PROGRESS_EVERY}" --heartbeat-sec "${HEARTBEAT_SEC}" $( [ "${VERBOSE}" = "1" ] && echo "--verbose" ) || true
    - $REPO_PATH/Runner/utils/send-to-lava.sh PMQTest.res
