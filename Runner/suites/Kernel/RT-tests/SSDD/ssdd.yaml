metadata:
  name: SSDD
  format: "Lava-Test Test Definition 1.0"
  description: "Run rt-tests ssdd (PTRACE_SINGLESTEP interference test) in JSON mode and parse results without requiring python3."
  os:
    - linux
  scope:
    - performance
    - preempt-rt

params:
  BACKGROUND_CMD: ""
  ITERATIONS: "1"

  FORKS: "10"
  SSDD_ITERS: "10000"
  QUIET: "true"

  BINARY: ""
  OUT_DIR: "./logs_SSDD"

  VERBOSE: "0"
  PROGRESS_EVERY: "1"
  HEARTBEAT_SEC: "10"

run:
  steps:
    - REPO_PATH=$PWD
    - cd Runner/suites/Kernel/RT-tests/SSDD
    - ./run.sh --iterations "${ITERATIONS}" --background-cmd "${BACKGROUND_CMD}" --forks "${FORKS}" --ssdd-iters "${SSDD_ITERS}" --quiet "${QUIET}" --binary "${BINARY}" --out "${OUT_DIR}" --progress-every "${PROGRESS_EVERY}" --heartbeat-sec "${HEARTBEAT_SEC}" $( [ "${VERBOSE}" = "1" ] && echo "--verbose" ) || true
    - $REPO_PATH/Runner/utils/send-to-lava.sh SSDD.res
